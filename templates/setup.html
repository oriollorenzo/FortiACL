<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Configuració inicial | ACL Manager</title>
    <link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23EE3124'/%3E%3Cg fill='white'%3E%3Crect x='14' y='14' width='8' height='8' rx='1.2'/%3E%3Crect x='28' y='14' width='8' height='8' rx='1.2'/%3E%3Crect x='42' y='14' width='8' height='8' rx='1.2'/%3E%3Crect x='14' y='28' width='8' height='8' rx='1.2'/%3E%3Crect x='42' y='28' width='8' height='8' rx='1.2'/%3E%3Crect x='14' y='42' width='8' height='8' rx='1.2'/%3E%3Crect x='28' y='42' width='8' height='8' rx='1.2'/%3E%3Crect x='42' y='42' width='8' height='8' rx='1.2'/%3E%3C/g%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex text-center items-center justify-center font-sans">
    <div class="bg-gray-800 p-8 rounded-lg border border-gray-700 w-full max-w-md shadow-2xl">
        <h1 class="text-xl font-bold flex items-center justify-center text-blue-400 italic mb-2">
            <svg class="w-6 h-6 mr-3 shrink-0" viewBox="0 0 64 64" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <rect width="64" height="64" rx="10" fill="#EE3124"/>
                <g fill="white">
                    <rect x="12" y="12" width="10" height="10" rx="1.5"/>
                    <rect x="27" y="12" width="10" height="10" rx="1.5"/>
                    <rect x="42" y="12" width="10" height="10" rx="1.5"/>
                    <rect x="12" y="27" width="10" height="10" rx="1.5"/>
                    <rect x="42" y="27" width="10" height="10" rx="1.5"/>
                    <rect x="12" y="42" width="10" height="10" rx="1.5"/>
                    <rect x="27" y="42" width="10" height="10" rx="1.5"/>
                    <rect x="42" y="42" width="10" height="10" rx="1.5"/>
                </g>
            </svg>
            ACL Manager
        </h1>
        <p class="text-sm text-gray-400 mb-8">Crea el primer usuari administrador</p>
        <form method="post" action="/setup" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Usuari</label>
                <input type="text" name="username" required class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-sm focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Contrasenya</label>
                <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-sm focus:border-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition">Crear usuari</button>
        </form>
        {% if error %}
        <p class="text-red-500 text-xs mt-4 text-center font-bold">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
