<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiSwitch ACL Manager</title>
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23EE3124'/%3E%3Cg fill='white'%3E%3Crect x='12' y='12' width='10' height='10' rx='1.5'/%3E%3Crect x='27' y='12' width='10' height='10' rx='1.5'/%3E%3Crect x='42' y='12' width='10' height='10' rx='1.5'/%3E%3Crect x='12' y='27' width='10' height='10' rx='1.5'/%3E%3Crect x='42' y='27' width='10' height='10' rx='1.5'/%3E%3Crect x='12' y='42' width='10' height='10' rx='1.5'/%3E%3Crect x='27' y='42' width='10' height='10' rx='1.5'/%3E%3Crect x='42' y='42' width='10' height='10' rx='1.5'/%3E%3C/g%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sticky-th {
            position: sticky;
            top: 73px;
            z-index: 40;
            background-color: #27272a !important;
            border-bottom: 1px solid #3f3f46;
        }
        .hover-row:hover { background-color: #27272a; }
        .menu-item-active {
            background: linear-gradient(to right, rgba(239,68,68,.18), rgba(239,68,68,0));
            border-left: 2px solid #ef4444;
            color: #fff;
        }
        .panel-hidden { display: none; }
        .tree-chevron { transition: transform .15s ease; }
        .tree-open .tree-chevron { transform: rotate(90deg); }
        .forti-badge {
            font-size: 10px;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 9999px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-5xl text-red-500 mb-4"></i>
            <p id="loading-text" class="text-lg font-bold">Processant operació...</p>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-zinc-900 border-r border-zinc-800 sticky top-0 h-screen overflow-y-auto">
            <div class="px-6 py-4 border-b border-zinc-800">
    <div class="flex items-center gap-3">
        <div class="w-6 h-6 rounded bg-red-600 flex items-center justify-center shadow-lg">
            <svg class="w-5 h-5 text-white" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
                <rect x="12" y="12" width="10" height="10" rx="1.5"></rect>
                <rect x="27" y="12" width="10" height="10" rx="1.5"></rect>
                <rect x="42" y="12" width="10" height="10" rx="1.5"></rect>
                <rect x="12" y="27" width="10" height="10" rx="1.5"></rect>
                <rect x="42" y="27" width="10" height="10" rx="1.5"></rect>
                <rect x="12" y="42" width="10" height="10" rx="1.5"></rect>
                <rect x="27" y="42" width="10" height="10" rx="1.5"></rect>
                <rect x="42" y="42" width="10" height="10" rx="1.5"></rect>
            </svg>
        </div>
        <div>
            <div class="text-xl font-bold tracking-tight text-white">ACL MANAGER</div>
            <div class="text-xs text-zinc-400 mt-0.5">Switch Fabric Secure</div>
        </div>
    </div>
</div>

            <nav class="px-3 py-4">
                <div class="tree-group tree-open" data-group="campus">
                    <button class="w-full flex items-center justify-between px-3 py-2 text-[11px] font-bold text-zinc-400 uppercase tracking-[0.18em] hover:text-white"
                            data-group-toggle="campus">
                        <span>Campus</span>
                        <i class="fas fa-chevron-right tree-chevron text-[10px]"></i>
                    </button>
                    <div class="mt-1 space-y-1" data-group-body="campus" id="campus-tree"></div>
                </div>

                <div class="mt-5 tree-group tree-open" data-group="operations">
                    <button class="w-full flex items-center justify-between px-3 py-2 text-[11px] font-bold text-zinc-400 uppercase tracking-[0.18em] hover:text-white"
                            data-group-toggle="operations">
                        <span>Operacions</span>
                        <i class="fas fa-chevron-right tree-chevron text-[10px]"></i>
                    </button>
                    <div class="mt-1 space-y-1" data-group-body="operations">
                        <button data-panel-trigger="embedded"
                                data-iframe-src="/acl-hits?embedded=1"
                                data-panel-title="ACL Hits"
                                data-panel-subtitle="Històric de registres. Sincronitza a la pantalla de campus per obtenir resultats actualitzats"
                                class="panel-trigger w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-md transition">
                            <i class="fas fa-chart-line text-zinc-500"></i>
                            <span>ACL Hits</span>
                        </button>

                        <button data-panel-trigger="embedded"
                                data-iframe-src="/logs?embedded=1"
                                data-panel-title="Logs"
                                data-panel-subtitle="Històric de logs del programa"
                                class="panel-trigger w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-md transition">
                            <i class="fas fa-file-alt text-zinc-500"></i>
                            <span>Logs</span>
                        </button>
                    </div>
                </div>

                <div class="mt-5 tree-group" data-group="system">
                    <button class="w-full flex items-center justify-between px-3 py-2 text-[11px] font-bold text-zinc-400 uppercase tracking-[0.18em] hover:text-white"
                            data-group-toggle="system">
                        <span>Sistema</span>
                        <i class="fas fa-chevron-right tree-chevron text-[10px]"></i>
                    </button>
                    <div class="mt-1 space-y-1 hidden" data-group-body="system">
                        <button data-panel-trigger="embedded"
                                data-iframe-src="/settings?embedded=1"
                                data-panel-title="Configuració"
                                class="panel-trigger w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-md transition">
                            <i class="fas fa-cog text-zinc-500"></i>
                            <span>Configuració</span>
                        </button>
                    </div>
                </div>

                <div class="mt-6 border-t border-zinc-800 pt-4">
                    <a href="/logout"
                       class="w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-md transition">
                        <i class="fas fa-sign-out-alt text-zinc-500"></i>
                        <span>Tancar sessió</span>
                    </a>
                </div>
            </nav>
        </aside>

        <main class="flex-1 min-w-0">
            <header class="sticky top-0 z-50 bg-zinc-950 border-b border-zinc-800 px-8 py-4">
                <div class="flex items-center justify-between gap-6">
                    <div>
                        <h1 id="page-title" class="text-xl font-bold text-white tracking-tight">Inventari</h1>
                        <p id="page-subtitle" class="text-zinc-500 text-xs mt-1">Selecciona un campus per començar.</p>
                    </div>
<div id="inventory-toolbar" class="flex items-center gap-2.5">
    <div class="relative">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
        <input
            type="text"
            id="switch-search"
            placeholder="Cercar nom, sèrie o model..."
            class="w-80 bg-zinc-900 border border-zinc-700 text-sm text-zinc-100 rounded-lg pl-9 pr-3 py-2 focus:outline-none focus:ring-2 focus:ring-zinc-600 focus:border-zinc-500"
        >
    </div>

    <button id="refresh-campus-btn"
            class="bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded text-[11px] font-bold border border-zinc-700 transition whitespace-nowrap">
        <i class="fas fa-rotate-right mr-1.5"></i>Refrescar
    </button>

    <button id="clear-selected-btn"
            class="bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded text-[11px] font-bold border border-zinc-700 transition whitespace-nowrap">
        <i class="fas fa-trash-alt mr-1.5"></i>Esborrar ACLs
    </button>

    <button id="sync-selected-btn"
            class="bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded text-[11px] font-bold border border-zinc-700 transition whitespace-nowrap">
        <i class="fas fa-sync-alt mr-1.5"></i>Sincronitzar seleccionats
    </button>

    <button id="scan-acl-hits-btn"
            class="bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded text-[11px] font-bold border border-zinc-700 transition whitespace-nowrap">
        <i class="fas fa-chart-line mr-1.5"></i>Escanejar ACL hits
    </button>
</div>

                </div>
            </header>

            <section id="panel-inventory" data-panel="inventory" class="panel-view px-8 pt-3 pb-6">
                <div class="rounded-lg shadow-2xl border border-zinc-800 overflow-visible">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-zinc-300 text-[11px] font-bold uppercase tracking-wider">
                                <th class="sticky-th p-4 w-12 text-center rounded-tl-lg">
                                    <input type="checkbox" id="select-all" class="rounded border-zinc-600 bg-zinc-800 text-red-600">
                                </th>
                                <th class="sticky-th p-4 cursor-pointer hover:text-white" data-sort-col="name">
                                    Nom del switch <span id="sort-name" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 cursor-pointer hover:text-white" data-sort-col="model_profile">
                                    Model <span id="sort-model_profile" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 cursor-pointer hover:text-white" data-sort-col="serial">
                                    Sèrie <span id="sort-serial" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 text-center cursor-pointer hover:text-white" data-sort-col="status">
                                    Estat FGT <span id="sort-status" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 text-center cursor-pointer hover:text-white" data-sort-col="versio_acl">
                                    Versió ACL <span id="sort-versio_acl" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 text-center cursor-pointer hover:text-white" data-sort-col="acls_sincronitzades">
                                    Estat Sync <span id="sort-acls_sincronitzades" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                                <th class="sticky-th p-4 text-center rounded-tr-lg cursor-pointer hover:text-white" data-sort-col="ports_congelats_count">
                                    Ports congelats <span id="sort-ports_congelats_count" class="ml-1 text-[10px] text-red-300 normal-case"></span>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="switches-body" class="divide-y divide-zinc-800 bg-zinc-900">
                            <tr>
                                <td colspan="8" class="p-12 text-center text-zinc-500 italic">
                                    Tria un campus del menú lateral.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="panel-embedded" data-panel="embedded" class="panel-view panel-hidden px-0 py-0">
                <iframe id="embedded-frame"
                        class="w-full h-[calc(100vh-88px)] border-0 bg-zinc-950"
                        src="about:blank"></iframe>
            </section>
        </main>
    </div>

    <div id="ports-modal" class="hidden fixed inset-0 bg-black/80 z-[210] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-zinc-900 w-full max-w-4xl rounded-lg border border-zinc-800 shadow-2xl">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                <h3 id="ports-modal-title" class="text-lg font-bold text-red-400"></h3>
                <button id="close-ports-modal-x" class="text-zinc-400 hover:text-white transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-8">
                <div class="flex items-center space-x-6 mb-6 text-[10px] font-bold uppercase tracking-widest text-zinc-500 bg-black/20 p-3 rounded border border-zinc-800">
                    <div class="flex items-center">
                        <span class="w-3 h-3 bg-zinc-700 border border-zinc-600 rounded mr-2"></span> Port estàndard
                    </div>
                    <div class="flex items-center">
                        <span class="w-3 h-3 bg-sky-900 border border-sky-500 rounded mr-2"></span> Port congelat
                    </div>
                </div>
                <div id="ports-grid" class="grid grid-cols-12 gap-2 max-h-[60vh] overflow-y-auto pr-2"></div>
            </div>
            <div class="p-4 bg-black/20 flex justify-end rounded-b-lg border-t border-zinc-800">
                <button id="close-ports-modal-btn" class="bg-zinc-800 hover:bg-zinc-700 px-8 py-2 rounded text-xs font-bold transition">
                    Tancar
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/console_main.js"></script>
</body>
</html>
