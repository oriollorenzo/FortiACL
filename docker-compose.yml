services:
  app:
    build:
      context: .
    container_name: forti-api-app
    restart: unless-stopped
    environment:
      FORTI_API_CONFIG_PATH: /data/config/config.yaml
      FORTI_API_DB_PATH: /data/db/fortiswitch.db
      FORTI_API_LOG_DIR: /data/logs
    volumes:
      - ./data/config:/data/config
      - ./data/db:/data/db
      - ./data/logs:/data/logs
    expose:
      - "8000"

  nginx:
    image: nginx:1.29-alpine
    container_name: forti-api-nginx
    restart: unless-stopped
    depends_on:
      - app
    environment:
      SERVER_NAME: ${SERVER_NAME}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/certs/fullchain.pem}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/certs/privkey.pem}
    ports:
      - "8499:443"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./data/certs:/certs:ro
